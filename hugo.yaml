baseURL: https://blossomandjetsam.com
languageCode: en-us
title: Blossom and Jetsam
theme: PaperMod

params:
  defaultTheme: light
  disableThemeToggle: true
  homeInfoParams:
    Title: "Blossom and Jetsam"
    Content: >-
      Analog photographs, 
      handmade books, 
      darkness and light      
  
  hideMeta: true

assets:
  favicon16x16: /assets/favicon-16x16.png
  favicon32x32: /assets/favicon-32x32.png
  apple_touch_icon: /assets/apple-touch-icon.png
  
favicon: favicon.ico

menu:
  main:
  - identifier: books
    name: Books
    url: /books
    weight: 10
    
  - identifier: gallery
    name: Gallery
    url: /gallery/
    weight: 20

  - identifier: process
    name: Process
    url: /process/
    weight: 30

  - identifier: journal
    name: Journal
    url: /posts/
    weight: 40

  - identifier: about
    name: About
    url: /about/
    weight: 50

caches:
  assets:
    dir: :resourceDir/_gen
    maxAge: -1
  getcsv:
    dir: :cacheDir/:project
    maxAge: -1
  getjson:
    dir: :cacheDir/:project
    maxAge: -1
  getresource:
    dir: :cacheDir/:project
    maxAge: -1
  images:
    dir: :cacheDir/images
    maxAge: -1
  misc:
    dir: :cacheDir/:project
    maxAge: -1
  modules:
    dir: :cacheDir/modules
    maxAge: -1
